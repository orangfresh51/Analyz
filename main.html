<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Analyz — Bull_Time</title>
  <meta name="description" content="Analyz: bull/bear dashboard for Bull_Time + Bulla_Beara." />
  <style>
    :root{
      --bg0:#070A10;
      --bg1:#0B1020;
      --bg2:#0F1933;
      --fg0:#EAF2FF;
      --fg1:#BBD0FF;
      --mut:#7F93C6;
      --line:#1F2A52;
      --good:#23D18B;
      --warn:#F6C945;
      --bad:#FF4D6D;
      --ai:#7C5CFF;
      --shadow: 0 18px 50px rgba(0,0,0,.45);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Liberation Sans", sans-serif;
      --r: 14px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: var(--sans);
      color: var(--fg0);
      background:
        radial-gradient(1200px 700px at 20% 10%, rgba(124,92,255,.22), transparent 55%),
        radial-gradient(1200px 700px at 80% 20%, rgba(35,209,139,.15), transparent 60%),
        radial-gradient(900px 600px at 35% 85%, rgba(255,77,109,.10), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1) 40%, var(--bg0));
    }
    header{
      position:sticky; top:0; z-index:5;
      backdrop-filter: blur(12px);
      background: rgba(7,10,16,.62);
      border-bottom:1px solid rgba(31,42,82,.8);
    }
    .wrap{max-width:1200px; margin:0 auto; padding:16px 18px;}
    .row{display:flex; gap:14px; align-items:center; flex-wrap:wrap;}
    .brand{
      display:flex; align-items:baseline; gap:10px;
      letter-spacing:.2px;
    }
    .brand h1{margin:0; font-size:18px; font-weight:720}
    .tag{
      font-family:var(--mono);
      font-size:12px;
      color: var(--mut);
      padding:4px 8px;
      border:1px solid rgba(31,42,82,.85);
      border-radius:999px;
      background: rgba(15,25,51,.25);
    }
    .sp{flex:1}
    button{
      cursor:pointer;
      font-weight:650;
      border-radius: 12px;
      border:1px solid rgba(31,42,82,.9);
      color: var(--fg0);
      background: linear-gradient(180deg, rgba(15,25,51,.9), rgba(11,16,32,.85));
      padding:10px 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,.25);
    }
    button:hover{border-color: rgba(124,92,255,.55)}
    button:active{transform: translateY(1px)}
    .pill{
      display:inline-flex; align-items:center; gap:8px;
      padding:7px 10px;
      border-radius:999px;
      border:1px solid rgba(31,42,82,.85);
      background: rgba(15,25,51,.35);
      color: var(--fg1);
      font-size:12px;
      font-family: var(--mono);
    }
    .dot{width:8px;height:8px;border-radius:50%}
    .dot.ok{background:var(--good)}
    .dot.no{background:var(--bad)}
    main .grid{
      display:grid;
      grid-template-columns: 1.15fr .85fr;
      gap:16px;
      margin-top:16px;
    }
    @media (max-width: 980px){
      main .grid{grid-template-columns:1fr}
    }
    .card{
      border:1px solid rgba(31,42,82,.85);
      background: rgba(11,16,32,.55);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .card .hd{
      padding:14px 14px 10px 14px;
      border-bottom:1px solid rgba(31,42,82,.55);
      display:flex; gap:12px; align-items:center; flex-wrap:wrap;
    }
    .card .hd h2{margin:0; font-size:14px; font-weight:760; letter-spacing:.2px}
    .card .bd{padding:14px}
    .kpi{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:12px;
    }
    @media (max-width: 620px){ .kpi{grid-template-columns:1fr} }
    .k{
      border:1px solid rgba(31,42,82,.65);
      background: rgba(15,25,51,.30);
      border-radius: 12px;
      padding:12px;
    }
    .k .l{font-size:12px; color:var(--mut); font-family:var(--mono)}
    .k .v{font-size:22px; font-weight:800; margin-top:6px; letter-spacing:.2px}
    .k .s{font-size:12px; color:var(--fg1); margin-top:6px}
    .state{
      display:flex; align-items:center; gap:10px;
      font-family: var(--mono);
      font-size:12px;
      padding:8px 10px;
      border-radius:12px;
      border:1px solid rgba(31,42,82,.75);
